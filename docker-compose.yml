version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: qrma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qrma_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qrma_saas"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: qrma-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/qrma_saas
      REPORT_RECOMMENDATION_MODE: vitalhealth_clinical_optimised
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REPORT_BUILD_VERSION: dev
    ports:
      - "8000:8000"
    volumes:
      - ./app/generated:/app/app/generated
      - ./app/uploads:/app/app/uploads

volumes:
  postgres_data: