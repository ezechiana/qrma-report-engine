{% extends "base.html" %}

{% block content %}
<style>
.dashboard-subtitle {
    color: #64748b;
    margin-bottom: 24px;
}

.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 28px;
}

.dashboard-card {
    background: white;
    border-radius: 18px;
    padding: 20px;
    border: 1px solid #e2e8f0;
}

.card-title {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 6px;
}

.card-value {
    font-size: 26px;
    font-weight: 700;
}

.dashboard-section {
    margin-top: 20px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
}

.secondary-btn {
    border: 1px solid #d1d5db;
    background: white;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}

.reports-table {
    width: 100%;
    border-collapse: collapse;
}

.reports-table th {
    text-align: left;
    font-size: 13px;
    color: #64748b;
    padding: 10px;
}

.reports-table td {
    padding: 12px 10px;
    border-top: 1px solid #f1f5f9;
    vertical-align: top;
}

.reports-table tr:hover {
    background: #f8fafc;
}

.dashboard-error {
    display: none;
    margin-bottom: 16px;
}

.search-input {
    max-width: 320px;
}
</style>

<div id="dashboard-error" class="error dashboard-error"></div>

<p class="dashboard-subtitle">Overview of your recent activity</p>

<div class="dashboard-grid">
    <div class="dashboard-card">
        <div class="card-title">Total Reports</div>
        <div class="card-value" id="total-reports">—</div>
    </div>

    <div class="dashboard-card">
        <div class="card-title">Recent Cases</div>
        <div class="card-value" id="total-cases">—</div>
    </div>

    <div class="dashboard-card">
        <div class="card-title">Last Activity</div>
        <div class="card-value" id="last-activity">—</div>
    </div>
</div>

<div class="dashboard-section">
    <div class="section-header">
        <h2>Recent Reports</h2>
        <div class="btn-row">
            <input class="search-input" id="dashboard-search" placeholder="Search patient or case name" />
            <button class="secondary-btn" type="button" id="refresh-dashboard-btn">Refresh</button>
        </div>
    </div>

    <div class="card">
        <table class="reports-table">
            <thead>
                <tr>
                    <th>Patient / Case</th>
                    <th>Version</th>
                    <th>Scan date</th>
                    <th>Generated</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="reports-table-body">
                <tr><td colspan="5">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let dashboardRows = [];

    function showDashboardError(message) {
        const box = document.getElementById("dashboard-error");
        box.textContent = message;
        box.style.display = "block";
    }

    function clearDashboardError() {
        const box = document.getElementById("dashboard-error");
        box.textContent = "";
        box.style.display = "none";
    }

    function renderDashboardRows() {
        const tbody = document.getElementById("reports-table-body");
        const query = (document.getElementById("dashboard-search").value || "").trim().toLowerCase();

        const filtered = dashboardRows.filter(item => {
            const hay = `${item.display_name || ""} ${item.patient_display_name || ""} ${item.generated_at || ""} ${item.scan_datetime || ""}`.toLowerCase();
            return !query || hay.includes(query);
        });

        if (!filtered.length) {
            tbody.innerHTML = `<tr><td colspan="5">No matching reports.</td></tr>`;
            return;
        }

        tbody.innerHTML = filtered.map(item => `
            <tr>
                <td>${safeText(item.display_name)}</td>
                <td>v${safeText(item.version_number)}</td>
                <td>${formatDate(item.scan_datetime)}</td>
                <td>${formatDate(item.generated_at)}</td>
                <td><a class="link" href="/app/reports/${item.id}">Open</a></td>
            </tr>
        `).join("");
    }

    async function loadDashboard() {
        clearDashboardError();

        const authed = await requireAuthOrRedirect();
        if (!authed) return;

        try {
            const [reportsRes, casesRes] = await Promise.all([
                apiFetch("/api/reports"),
                apiFetch("/api/cases"),
            ]);

            if (!reportsRes.ok) {
                const errorData = await reportsRes.json().catch(() => ({}));
                showDashboardError(errorData.detail || "Could not load dashboard data.");
                document.getElementById("reports-table-body").innerHTML =
                    `<tr><td colspan="5">Could not load reports.</td></tr>`;
                return;
            }

            const reports = await reportsRes.json();
            const reportList = Array.isArray(reports) ? reports : (reports.items || []);

            const cases = casesRes.ok ? await casesRes.json() : [];
            const caseList = Array.isArray(cases) ? cases : (cases.items || []);
            const caseMap = {};
            caseList.forEach(c => { caseMap[String(c.id)] = c; });

            dashboardRows = reportList
                .slice()
                .sort((a, b) => new Date(b.generated_at || 0) - new Date(a.generated_at || 0))
                .map(r => {
                    const linkedCase = caseMap[String(r.case_id)] || {};
                    return {
                        ...r,
                        display_name: r.display_name || linkedCase.display_name || linkedCase.title || `Case ${safeText(r.case_id)}`,
                        patient_display_name: r.patient_display_name || linkedCase.patient_display_name || "",
                        scan_datetime: r.scan_datetime || linkedCase.scan_datetime || null,
                    };
                });

            document.getElementById("total-reports").textContent = dashboardRows.length;

            const caseIds = new Set(dashboardRows.map(r => r.case_id).filter(Boolean));
            document.getElementById("total-cases").textContent = caseIds.size;

            document.getElementById("last-activity").textContent =
                dashboardRows.length && dashboardRows[0].generated_at
                    ? formatDate(dashboardRows[0].generated_at)
                    : "—";

            renderDashboardRows();
        } catch (err) {
            console.error(err);
            showDashboardError("Unexpected error while loading dashboard.");
            document.getElementById("reports-table-body").innerHTML =
                `<tr><td colspan="5">Unexpected error.</td></tr>`;
        }
    }

    document.getElementById("refresh-dashboard-btn").addEventListener("click", loadDashboard);
    document.getElementById("dashboard-search").addEventListener("input", renderDashboardRows);

    loadDashboard();
</script>
{% endblock %}
