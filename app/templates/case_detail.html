{% extends "base.html" %}

{% block content %}
<div id="error-box" class="error" style="display:none;"></div>
<div id="success-box" class="success" style="display:none;"></div>

<div class="card">
    <h2>Case detail</h2>
    <div id="case-summary" class="muted">Loading case…</div>
</div>

<div class="card">
    <h3>Actions</h3>
    <div class="btn-row">
        <button id="generate-report-btn">Generate report</button>
        <button class="btn secondary" id="refresh-case-btn" type="button">Refresh case</button>
    </div>
</div>

<div class="card">
    <h3>Latest report</h3>
    <div id="latest-report-block" class="muted">No report generated yet.</div>
</div>

<div class="card">
    <h3>Share report</h3>
    <div class="field">
        <label>Optional password</label>
        <input id="share-password" placeholder="Leave blank for no password" />
    </div>
    <div class="btn-row">
        <button id="create-share-link-btn" type="button">Create share link</button>
    </div>
    <div id="share-result" class="muted" style="margin-top:12px;"></div>
</div>

<script>
    const caseId = "{{ case_id }}";
    let latestReportId = null;

    function setError(msg) {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearError() {
        const box = document.getElementById("error-box");
        box.style.display = "none";
        box.textContent = "";
    }

    function setSuccess(msg) {
        const box = document.getElementById("success-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    async function loadCase() {
        clearError();
        if (!requireAuthOrRedirect()) return;

        const caseResponse = await apiFetch(`/api/cases/${caseId}`);
        const caseData = await caseResponse.json();

        if (!caseResponse.ok) {
            setError(caseData.detail || "Could not load case.");
            return;
        }

        const patient =
            caseData.patient?.full_name ||
            [caseData.patient?.first_name, caseData.patient?.last_name].filter(Boolean).join(" ") ||
            caseData.title ||
            "Unnamed case";

        document.getElementById("case-summary").innerHTML = `
            <strong>${patient}</strong><br>
            Status: ${safeText(caseData.status)}<br>
            Created: ${formatDate(caseData.created_at)}
        `;

        const latestReportResponse = await apiFetch(`/api/cases/${caseId}/latest-report`);
        if (latestReportResponse.ok) {
            const latest = await latestReportResponse.json();
            latestReportId = latest?.id || latest?.report_version_id || null;
        } else {
            latestReportId = null;
        }

        renderLatestReport();
    }

    async function generateReport() {
        clearError();

        const response = await apiFetch(`/api/cases/${caseId}/generate-report`, {
            method: "POST"
        });
        const data = await response.json();

        if (!response.ok) {
            setError(data.detail || "Could not generate report.");
            return;
        }

        latestReportId = data.report_version_id;
        setSuccess(`Report generated successfully (v${data.version_number}).`);
        renderLatestReport();
    }


    function renderLatestReport() {
        const block = document.getElementById("latest-report-block");
        if (!latestReportId) {
            block.textContent = "No report generated yet.";
            return;
        }

        block.innerHTML = `
            <div><strong>Report ready</strong></div>
            <div class="btn-row" style="margin-top:10px;">
                <a class="btn" href="/app/reports/${latestReportId}">Open report workspace</a>
                <button class="btn secondary" type="button" onclick="openFullReportFromCase()">Open full report</button>
                <a class="btn secondary" href="/api/reports/${latestReportId}/pdf" target="_blank">Download PDF</a>
              </div>
        `;
    }

    async function openFullReportFromCase() {
        clearError();

        if (!latestReportId) {
            setError("Generate a report first.");
            return;
        }

        const response = await apiFetch(`/api/reports/${latestReportId}/share-links`, {
            method: "POST",
            body: JSON.stringify({
                password: null,
                expires_at: null
            }),
        });

        const data = await response.json();

        if (!response.ok) {
            setError(data.detail || "Could not open the full report.");
            return;
        }

        window.open(data.share_url, "_blank", "noopener,noreferrer");
    }




    async function createShareLink() {
        clearError();

        if (!latestReportId) {
            setError("Generate a report first.");
            return;
        }

        const payload = {
            password: document.getElementById("share-password").value || null,
            expires_at: null
        };

        const response = await apiFetch(`/api/reports/${latestReportId}/share-links`, {
            method: "POST",
            body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
            setError(data.detail || "Could not create share link.");
            return;
        }

        document.getElementById("share-result").innerHTML = `
            <strong>Share link:</strong><br>
            <a class="link" href="${data.share_url}" target="_blank">${data.share_url}</a>
        `;
    }

    document.getElementById("generate-report-btn").addEventListener("click", generateReport);
    document.getElementById("create-share-link-btn").addEventListener("click", createShareLink);
    document.getElementById("refresh-case-btn").addEventListener("click", loadCase);

    loadCase();
</script>
{% endblock %}
