{% extends "base.html" %}

{% block content %}
<div id="error-box" class="error" style="display:none;"></div>
<div id="success-box" class="success" style="display:none;"></div>

<div class="card">
    <h2 id="case-page-title">Case detail</h2>
    <div id="case-summary" class="muted">Loading case…</div>
</div>

<div class="card">
    <h3>Actions</h3>
    <div class="btn-row">
        <button class="btn" id="generate-report-btn" type="button">Generate report</button>
        <button class="btn secondary" id="refresh-case-btn" type="button">Refresh case</button>
    </div>
</div>

<div class="card">
    <h3>Latest report</h3>
    <div id="latest-report-block" class="muted">No report generated yet.</div>
</div>

<div class="card">
    <h3>Share report</h3>
    <div class="field">
        <label>Optional password</label>
        <input id="share-password" placeholder="Leave blank for no password" />
    </div>
    <div class="btn-row">
        <button class="btn" id="create-share-link-btn" type="button">Create share link</button>
    </div>
    <div id="share-result" class="muted" style="margin-top:12px;"></div>
</div>

<script>
    const caseId = "{{ case_id }}";
    let latestReportId = null;

    function setError(msg) {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearError() {
        const box = document.getElementById("error-box");
        box.style.display = "none";
        box.textContent = "";
    }

    function setSuccess(msg) {
        const box = document.getElementById("success-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearSuccess() {
        const box = document.getElementById("success-box");
        box.style.display = "none";
        box.textContent = "";
    }

    async function loadCase() {
        clearError();

        const authed = await requireAuthOrRedirect();
        if (!authed) return;

        try {
            const caseResponse = await apiFetch(`/api/cases/${caseId}`);
            const caseData = await caseResponse.json().catch(() => ({}));

            if (!caseResponse.ok) {
                setError(caseData.detail || "Could not load case.");
                return;
            }

            document.getElementById("case-page-title").textContent = caseData.display_name || "Case detail";

            document.getElementById("case-summary").innerHTML = `
                <strong>${safeText(caseData.display_name)}</strong><br>
                Patient: ${safeText(caseData.patient_display_name)}<br>
                Scan date: ${formatDate(caseData.scan_datetime)}<br>
                Status: ${safeText(caseData.status)}<br>
                Created: ${formatDate(caseData.created_at)}
            `;

            const latestReportResponse = await apiFetch(`/api/cases/${caseId}/latest-report`);
            if (latestReportResponse.ok) {
                const latest = await latestReportResponse.json();
                latestReportId = latest?.id || latest?.report_version_id || null;
                renderLatestReport(latest);
            } else {
                latestReportId = null;
                renderLatestReport(null);
            }
        } catch (err) {
            console.error(err);
            setError("Unexpected error while loading case.");
        }
    }

    async function generateReport() {
        clearError();
        clearSuccess();

        try {
            const response = await apiFetch(`/api/cases/${caseId}/generate-report`, {
                method: "POST"
            });
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                setError(data.detail || "Could not generate report.");
                return;
            }

            latestReportId = data.report_version_id;
            setSuccess(`Report generated successfully${data.version_number ? ` (v${data.version_number})` : ""}.`);
            await loadCase();
        } catch (err) {
            console.error(err);
            setError("Unexpected error while generating report.");
        }
    }

    function renderLatestReport(latest) {
        const block = document.getElementById("latest-report-block");

        if (!latestReportId) {
            block.textContent = "No report generated yet.";
            return;
        }

        block.innerHTML = `
            <div><strong>${safeText(latest?.display_name || "Report ready")}</strong></div>
            <div class="muted" style="margin-top:6px;">
                Version: v${safeText(latest?.version_number)}<br>
                Scan date: ${formatDate(latest?.scan_datetime)}<br>
                Generated: ${formatDate(latest?.generated_at)}
            </div>
            <div class="btn-row" style="margin-top:10px;">
                <a class="btn" href="/app/reports/${latestReportId}">Open report workspace</a>
                <a class="btn secondary" href="/app/reports/${latestReportId}/view">Open full report</a>
                <a class="btn secondary" href="/api/reports/${latestReportId}/pdf" target="_blank">Download PDF</a>
            </div>
        `;
    }

    async function createShareLink() {
        clearError();
        clearSuccess();

        if (!latestReportId) {
            setError("Generate a report first.");
            return;
        }

        try {
            const payload = {
                password: document.getElementById("share-password").value || null,
                expires_at: null
            };

            const response = await apiFetch(`/api/reports/${latestReportId}/share-links`, {
                method: "POST",
                body: JSON.stringify(payload),
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                setError(data.detail || "Could not create share link.");
                return;
            }

            document.getElementById("share-result").innerHTML = `
                <strong>Share link:</strong><br>
                <a class="link" href="${data.share_url}" target="_blank">${data.share_url}</a>
            `;

            setSuccess("Share link created.");
        } catch (err) {
            console.error(err);
            setError("Unexpected error while creating share link.");
        }
    }

    document.getElementById("generate-report-btn").addEventListener("click", generateReport);
    document.getElementById("create-share-link-btn").addEventListener("click", createShareLink);
    document.getElementById("refresh-case-btn").addEventListener("click", loadCase);

    loadCase();
</script>
{% endblock %}
