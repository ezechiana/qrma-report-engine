{% extends "base.html" %}

{% block content %}
<style>
.reports-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
}

.reports-search {
    max-width: 320px;
}

.reports-sort {
    max-width: 180px;
}
</style>

<div id="auth-warning" class="error" style="display:none;"></div>

<p class="muted" style="margin-bottom:20px;">Recent report versions generated from your cases.</p>

<div class="card">
    <div class="reports-toolbar">
        <input id="reports-search" class="reports-search" placeholder="Search patient or case name" />
        <select id="reports-sort" class="reports-sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
        </select>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Patient / Case</th>
                <th>Version</th>
                <th>Scan date</th>
                <th>Generated</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="reports-body">
            <tr><td colspan="5" class="muted">Loading…</td></tr>
        </tbody>
    </table>
</div>

<script>
    let allReports = [];

    function showReportsError(message) {
        const box = document.getElementById("auth-warning");
        box.style.display = "block";
        box.textContent = message;
    }

    function renderReports() {
        const tbody = document.getElementById("reports-body");
        const query = (document.getElementById("reports-search").value || "").trim().toLowerCase();
        const sort = document.getElementById("reports-sort").value;

        const filtered = allReports
            .filter(item => {
                const hay = `${item.display_name || ""} ${item.patient_display_name || ""} ${item.generated_at || ""} ${item.scan_datetime || ""}`.toLowerCase();
                return !query || hay.includes(query);
            })
            .sort((a, b) => {
                const ad = new Date(a.generated_at || 0).getTime();
                const bd = new Date(b.generated_at || 0).getTime();
                return sort === "oldest" ? ad - bd : bd - ad;
            });

        if (!filtered.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="muted">No reports found.</td></tr>`;
            return;
        }

        tbody.innerHTML = filtered.map(item => `
            <tr>
                <td>${safeText(item.display_name)}</td>
                <td>v${safeText(item.version_number)}</td>
                <td>${formatDate(item.scan_datetime)}</td>
                <td>${formatDate(item.generated_at)}</td>
                <td><a class="link" href="/app/reports/${item.id}">Open</a></td>
            </tr>
        `).join("");
    }

    async function loadReportsPage() {
        const authed = await requireAuthOrRedirect();
        if (!authed) return;

        try {
            const response = await apiFetch("/api/reports");

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                showReportsError(err.detail || "Could not load reports.");
                return;
            }

            const reports = await response.json();
            allReports = Array.isArray(reports) ? reports : (reports.items || []);

            renderReports();
        } catch (err) {
            console.error(err);
            showReportsError("Unexpected error while loading reports.");
        }
    }

    document.getElementById("reports-search").addEventListener("input", renderReports);
    document.getElementById("reports-sort").addEventListener("change", renderReports);

    loadReportsPage();
</script>
{% endblock %}
