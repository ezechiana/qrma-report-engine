{% extends "base.html" %}

{% block content %}
<style>
.reports-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
}

.reports-left,
.reports-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.reports-search {
    max-width: 320px;
}

.reports-sort {
    max-width: 180px;
}

.badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 12px;
    border-radius: 999px;
    background: #e2e8f0;
}

.badge.latest {
    background: #dcfce7;
    color: #166534;
}

.badge.archived {
    background: #fee2e2;
    color: #991b1b;
}

.link-danger {
    color: #dc2626;
    cursor: pointer;
}

.link-secondary {
    color: #475569;
    cursor: pointer;
}
</style>

<div id="reports-error" class="error" style="display:none;"></div>

<div class="card" style="margin-bottom:16px;">
    <h2 style="margin:0 0 6px;">Reports</h2>
    <p class="muted" style="margin:0;">
        Manage generated reports, versions, and archive old outputs.
    </p>
</div>

<div class="card">
    <div class="reports-toolbar">
        <div class="reports-left">
            <input id="reports-search" class="reports-search" placeholder="Search patient or case" />

            <select id="reports-sort" class="reports-sort">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
            </select>
        </div>

        <div class="reports-right">
            <label style="display:flex; align-items:center; gap:6px;">
                <input type="checkbox" id="show-archived">
                Show archived
            </label>
        </div>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Patient / Case</th>
                <th>Scan date/time</th>
                <th>Version</th>
                <th>Generated</th>
                <th>Status</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="reports-body">
            <tr><td colspan="6" class="muted">Loading?</td></tr>
        </tbody>
    </table>
</div>

<script>
let allReports = [];

function showReportsError(message) {
    const box = document.getElementById("reports-error");
    box.style.display = "block";
    box.textContent = message;
}

function getLatestVersions(reports) {
    const latestMap = {};
    reports.forEach(r => {
        if (!latestMap[r.case_id] || r.version_number > latestMap[r.case_id]) {
            latestMap[r.case_id] = r.version_number;
        }
    });
    return latestMap;
}

function renderReports() {
    const tbody = document.getElementById("reports-body");
    const query = (document.getElementById("reports-search").value || "").toLowerCase();
    const sort = document.getElementById("reports-sort").value;
    const showArchived = document.getElementById("show-archived").checked;

    const latestMap = getLatestVersions(allReports);

    let rows = allReports
        .filter(r => showArchived || !r.is_archived)
        .filter(r => {
            const hay = `${r.display_name || ""} ${r.patient_display_name || ""} ${r.scan_datetime_display || ""}`.toLowerCase();
            return !query || hay.includes(query);
        });

    rows.sort((a, b) => {
        const ad = new Date(a.generated_at || 0);
        const bd = new Date(b.generated_at || 0);
        return sort === "oldest" ? ad - bd : bd - ad;
    });

    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="muted">No reports found.</td></tr>`;
        return;
    }

    tbody.innerHTML = rows.map(r => {
        const isLatest = latestMap[r.case_id] === r.version_number;

        return `
        <tr>
            <td>
                ${safeText(r.display_name)}
                ${isLatest ? `<span class="badge latest">Latest</span>` : ""}
            </td>

            <td>
                ${safeText(r.scan_datetime_display || "?")}
            </td>

            <td>v${safeText(r.version_number)}</td>

            <td>${formatDate(r.generated_at)}</td>

            <td>
                ${r.is_archived
                    ? `<span class="badge archived">Archived</span>`
                    : `<span class="badge">Active</span>`
                }
            </td>

            <td>
                <a class="link" href="/app/reports/${r.id}">Open</a>
                &nbsp;|&nbsp;
                ${
                    r.is_archived
                    ? `<span class="link-secondary" onclick="restoreReport('${r.id}')">Restore</span>`
                    : `<span class="link-danger" onclick="archiveReport('${r.id}')">Archive</span>`
                }
            </td>
        </tr>
        `;
    }).join("");
}

async function loadReports() {
    const authed = await requireAuthOrRedirect();
    if (!authed) return;

    try {
        const response = await apiFetch("/api/reports?include_archived=true");

        if (!response.ok) {
            showReportsError("Could not load reports.");
            return;
        }

        const data = await response.json();
        allReports = Array.isArray(data) ? data : (data.items || []);

        renderReports();
    } catch (err) {
        console.error(err);
        showReportsError("Unexpected error.");
    }
}

async function archiveReport(id) {
    if (!confirm("Archive this report?")) return;

    const res = await apiFetch(`/api/reports/${id}/archive`, { method: "POST" });
    if (!res.ok) {
        showReportsError("Failed to archive report.");
        return;
    }

    loadReports();
}

async function restoreReport(id) {
    const res = await apiFetch(`/api/reports/${id}/restore`, { method: "POST" });
    if (!res.ok) {
        showReportsError("Failed to restore report.");
        return;
    }

    loadReports();
}

document.getElementById("reports-search").addEventListener("input", renderReports);
document.getElementById("reports-sort").addEventListener("change", renderReports);
document.getElementById("show-archived").addEventListener("change", renderReports);

loadReports();
</script>
{% endblock %}
