{% extends "base.html" %}

{% block content %}
<style>
.patients-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
}

.patients-toolbar-left,
.patients-toolbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.patients-search {
    max-width: 320px;
}

.patients-sort {
    max-width: 200px;
}

.empty-state {
    padding: 24px;
    text-align: center;
    color: #64748b;
}
</style>

<div id="patients-error" class="error" style="display:none;"></div>

<p class="muted" style="margin-bottom:20px;">Browse patients, review activity, and open a patient workspace.</p>

<div class="card">
    <div class="patients-toolbar">
        <div class="patients-toolbar-left">
            <input id="patients-search" class="patients-search" placeholder="Search patient name" />
            <select id="patients-sort" class="patients-sort">
                <option value="recent_activity">Most recent activity</option>
                <option value="newest">Newest created</option>
                <option value="oldest">Oldest created</option>
                <option value="name_asc">Name A–Z</option>
                <option value="name_desc">Name Z–A</option>
            </select>
        </div>

        <div class="patients-toolbar-right">
            <button class="btn" type="button" id="new-patient-btn">New Patient</button>
        </div>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Patient</th>
                <th>Cases</th>
                <th>Reports</th>
                <th>Last activity</th>
                <th>Source</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="patients-body">
            <tr><td colspan="6" class="muted">Loading…</td></tr>
        </tbody>
    </table>
</div>

<div class="card" id="new-patient-card" style="display:none;">
    <h3>Create patient</h3>

    <div class="grid-2">
        <div class="field">
            <label>First name</label>
            <input id="patient-first-name" maxlength="100">
        </div>

        <div class="field">
            <label>Last name</label>
            <input id="patient-last-name" maxlength="100">
        </div>

        <div class="field">
            <label>Date of birth</label>
            <input id="patient-dob" type="date" max="">
            <div class="muted" id="patient-age-preview" style="margin-top:6px;">Age will be calculated automatically.</div>
        </div>

        <div class="field">
            <label>Sex</label>
            <select id="patient-sex">
                <option value="">Select</option>
                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="other">Other</option>
                <option value="prefer_not_to_say">Prefer not to say</option>
            </select>
        </div>

        <div class="field">
            <label>Height (cm)</label>
            <input id="patient-height" type="number" step="0.1" min="0" max="300">
        </div>

        <div class="field">
            <label>Weight (kg)</label>
            <input id="patient-weight" type="number" step="0.1" min="0" max="500">
        </div>
    </div>

    <div class="btn-row">
        <button class="btn" type="button" id="save-patient-btn">Save Patient</button>
        <button class="btn secondary" type="button" id="cancel-patient-btn">Cancel</button>
    </div>
</div>


<script>
    let allPatients = [];

    function showPatientsError(message) {
        const box = document.getElementById("patients-error");
        box.style.display = "block";
        box.textContent = message;
    }

    function clearPatientsError() {
        const box = document.getElementById("patients-error");
        box.style.display = "none";
        box.textContent = "";
    }

    function normalisePatientName(item) {
        return item.full_name || [item.first_name, item.last_name].filter(Boolean).join(" ").trim() || "Unnamed patient";
    }

    function renderPatients() {
        const tbody = document.getElementById("patients-body");
        const query = (document.getElementById("patients-search").value || "").trim().toLowerCase();
        const sort = document.getElementById("patients-sort").value;

        let rows = allPatients.filter(item => {
            const hay = `${normalisePatientName(item)} ${(item.data_sources || []).join(" ")} ${item.last_activity_at || ""}`.toLowerCase();
            return !query || hay.includes(query);
        });

        if (sort === "name_asc") {
            rows.sort((a, b) => normalisePatientName(a).localeCompare(normalisePatientName(b)));
        } else if (sort === "name_desc") {
            rows.sort((a, b) => normalisePatientName(b).localeCompare(normalisePatientName(a)));
        } else if (sort === "oldest") {
            rows.sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0));
        } else if (sort === "newest") {
            rows.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        } else {
            rows.sort((a, b) => new Date(b.last_activity_at || b.updated_at || 0) - new Date(a.last_activity_at || a.updated_at || 0));
        }

        if (!rows.length) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No patients found.</div></td></tr>`;
            return;
        }

        tbody.innerHTML = rows.map(item => `
            <tr>
                <td>${safeText(normalisePatientName(item))}</td>
                <td>${safeText(item.case_count || 0)}</td>
                <td>${safeText(item.report_count || 0)}</td>
                <td>${formatDate(item.last_activity_at)}</td>
                <td>${safeText((item.data_sources || []).join(", "), "—")}</td>
                <td><a class="link" href="/app/patients/${item.id}">Open</a></td>
            </tr>
        `).join("");
    }

    async function loadPatients() {
        clearPatientsError();

        const authed = await requireAuthOrRedirect();
        if (!authed) return;

        try {
            const response = await apiFetch("/api/patients");
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                showPatientsError(data.detail || "Could not load patients.");
                return;
            }

            allPatients = Array.isArray(data) ? data : (data.items || []);
            renderPatients();
        } catch (err) {
            console.error(err);
            showPatientsError("Unexpected error while loading patients.");
        }
    }

    function calculateAgeFromDob(dobValue) {
    if (!dobValue) return null;

    const dob = new Date(dobValue);
    if (Number.isNaN(dob.getTime())) return null;

    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    const monthDiff = today.getMonth() - dob.getMonth();

    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
        age--;
    }

    return age;
}

    function updateAgePreview() {
        const dobValue = document.getElementById("patient-dob").value;
        const preview = document.getElementById("patient-age-preview");

        if (!dobValue) {
            preview.textContent = "Age will be calculated automatically.";
            return;
        }

        const age = calculateAgeFromDob(dobValue);
        if (age === null || age < 0) {
            preview.textContent = "Please enter a valid date of birth.";
            return;
        }

        preview.textContent = `Calculated age: ${age}`;
    }

    async function savePatient() {
        clearPatientsError();

        const dobValue = document.getElementById("patient-dob").value || null;
        const calculatedAge = calculateAgeFromDob(dobValue);

        if (dobValue) {
            const dob = new Date(dobValue);
            const today = new Date();

            if (dob > today) {
                showPatientsError("Date of birth cannot be in the future.");
                return;
            }

            if (dob.getFullYear() < 1900) {
                showPatientsError("Please enter a realistic date of birth.");
                return;
            }

            if (calculatedAge !== null && calculatedAge > 130) {
                showPatientsError("Please enter a realistic date of birth.");
                return;
            }
        }

        const payload = {
            first_name: document.getElementById("patient-first-name").value.trim(),
            last_name: document.getElementById("patient-last-name").value.trim(),
            date_of_birth: dobValue,
            sex: document.getElementById("patient-sex").value || null,
            height_cm: document.getElementById("patient-height").value ? Number(document.getElementById("patient-height").value) : null,
            weight_kg: document.getElementById("patient-weight").value ? Number(document.getElementById("patient-weight").value) : null,
        };

        if (!payload.first_name || !payload.last_name) {
            showPatientsError("First name and last name are required.");
            return;
        }

        try {
            const response = await apiFetch("/api/patients", {
                method: "POST",
                body: JSON.stringify(payload),
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                showPatientsError(data.detail || "Could not create patient.");
                return;
            }

            document.getElementById("new-patient-card").style.display = "none";
            document.getElementById("patient-first-name").value = "";
            document.getElementById("patient-last-name").value = "";
            document.getElementById("patient-dob").value = "";
            document.getElementById("patient-sex").value = "";
            document.getElementById("patient-height").value = "";
            document.getElementById("patient-weight").value = "";
            updateAgePreview();

            await loadPatients();
        } catch (err) {
            console.error(err);
            showPatientsError("Unexpected error while creating patient.");
        }
    }

    document.getElementById("patients-search").addEventListener("input", renderPatients);
    document.getElementById("patients-sort").addEventListener("change", renderPatients);

    document.getElementById("new-patient-btn").addEventListener("click", () => {
        document.getElementById("new-patient-card").style.display = "block";
    });

    document.getElementById("cancel-patient-btn").addEventListener("click", () => {
        document.getElementById("new-patient-card").style.display = "none";
        clearPatientsError();
    });

    document.getElementById("save-patient-btn").addEventListener("click", savePatient);
    document.getElementById("patient-dob").max = new Date().toISOString().split("T")[0];
    document.getElementById("patient-dob").addEventListener("input", updateAgePreview);

    loadPatients();
</script>
{% endblock %}
