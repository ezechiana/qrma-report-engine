{% extends "base.html" %}

{% block content %}
<div id="error-box" class="error" style="display:none;"></div>
<div id="success-box" class="success" style="display:none;"></div>

<div class="card">
    <h2>Upload QRMA HTML</h2>
    <p class="muted">Upload the original scan HTML to extract patient details and create a new case.</p>

    <form id="upload-form">
        <div class="field">
            <label>QRMA HTML file</label>
            <input id="scan-file" type="file" accept=".html,.htm" required />
        </div>

        <button type="submit">Upload and parse</button>
    </form>
</div>

<div class="card" id="confirm-card" style="display:none;">
    <h2>Confirm patient details</h2>

    <div class="field">
        <label>Patient handling</label>
        <select id="patient-mode">
            <option value="new">Create new patient</option>
            <option value="existing">Link to existing patient</option>
        </select>
    </div>

    <div id="existing-patient-block" style="display:none;">
        <div class="field">
            <label>Search existing patient</label>
            <input id="patient-search" placeholder="Type patient name" />
        </div>
        <div class="field">
            <label>Select patient</label>
            <select id="existing-patient-select">
                <option value="">Choose patient…</option>
            </select>
        </div>
    </div>

    <form id="confirm-form">
        <div class="grid-2">
            <div class="field">
                <label>First name</label>
                <input id="first_name" />
            </div>

            <div class="field">
                <label>Last name</label>
                <input id="last_name" />
            </div>

            <div class="field">
                <label>Date of birth</label>
                <input id="date_of_birth" />
            </div>

            <div class="field">
                <label>Age</label>
                <input id="age" />
            </div>

            <div class="field">
                <label>Sex</label>
                <input id="sex" />
            </div>

            <div class="field">
                <label>Height (cm)</label>
                <input id="height_cm" />
            </div>

            <div class="field">
                <label>Weight (kg)</label>
                <input id="weight_kg" />
            </div>

            <div class="field">
                <label>Case title</label>
                <input id="case_title" placeholder="QRMA scan case" />
            </div>
        </div>

        <div class="btn-row">
            <button type="submit">Create case</button>
            <button type="button" class="btn secondary" id="create-and-generate">Create and generate report</button>
        </div>
    </form>
</div>

<script>
    let temporaryUploadId = null;
    let parsedScanMetadata = null;
    let allPatients = [];

    function showError(msg) {
        const box = document.getElementById("error-box");
        box.style.display = "block";

        if (Array.isArray(msg)) {
            box.innerHTML = msg.map(item => {
                const loc = Array.isArray(item.loc) ? item.loc.join(" → ") : "";
                const text = item.msg || JSON.stringify(item);
                return `<div>${loc ? `<strong>${loc}:</strong> ` : ""}${text}</div>`;
            }).join("");
            return;
        }

        if (typeof msg === "object" && msg !== null) {
            box.textContent = JSON.stringify(msg, null, 2);
            return;
        }

        box.textContent = msg;
    }

    function clearError() {
        const box = document.getElementById("error-box");
        box.style.display = "none";
        box.textContent = "";
    }

    function showSuccess(msg) {
        const box = document.getElementById("success-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function patientName(p) {
        return (
            p.full_name ||
            [p.first_name, p.last_name].filter(Boolean).join(" ") ||
            "Unnamed patient"
        );
    }

    function renderExistingPatients() {
        const select = document.getElementById("existing-patient-select");
        const query = (document.getElementById("patient-search").value || "").trim().toLowerCase();

        const filtered = allPatients.filter(p => patientName(p).toLowerCase().includes(query));

        select.innerHTML = `<option value="">Choose patient…</option>` + filtered.map(p => `
            <option value="${p.id}">${patientName(p)}</option>
        `).join("");
    }

    async function loadPatientsForLinking() {
        try {
            const res = await apiFetch("/api/patients");
            if (!res.ok) return;
            const data = await res.json();
            allPatients = Array.isArray(data) ? data : (data.items || []);
            renderExistingPatients();
        } catch (e) {
            console.warn("Could not load patients for linking", e);
        }
    }

    document.getElementById("patient-mode").addEventListener("change", () => {
        const mode = document.getElementById("patient-mode").value;
        document.getElementById("existing-patient-block").style.display =
            mode === "existing" ? "block" : "none";
    });

    document.getElementById("patient-search").addEventListener("input", renderExistingPatients);

    document.getElementById("upload-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        clearError();

        if (!await requireAuthOrRedirect()) return;

        const fileInput = document.getElementById("scan-file");
        if (!fileInput.files.length) {
            showError("Please choose a file.");
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        const response = await apiFetch("/api/cases/import-from-html", {
            method: "POST",
            headers: {},
            body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
            showError(data.detail || "Could not parse the HTML file.");
            return;
        }

        temporaryUploadId = data.temporary_upload_id;
        parsedScanMetadata = data.scan_metadata || null;

        const p = data.source_patient_data || {};
        document.getElementById("first_name").value = p.first_name || "";
        document.getElementById("last_name").value = p.last_name || "";
        document.getElementById("date_of_birth").value = p.date_of_birth || "";
        document.getElementById("age").value = p.age || "";
        document.getElementById("sex").value = p.sex || "";
        document.getElementById("height_cm").value = p.height_cm || "";
        document.getElementById("weight_kg").value = p.weight_kg || "";
        document.getElementById("case_title").value =
            (p.full_name ? `${p.full_name} QRMA scan` : "QRMA scan case");

        document.getElementById("confirm-card").style.display = "block";
        await loadPatientsForLinking();
        showSuccess("Scan parsed successfully. Please confirm the patient details.");
    });

    async function createCase(generateAfter = false) {
        clearError();

        if (!temporaryUploadId) {
            showError("Please upload and parse a scan first.");
            return;
        }

        let recommendationMode = "natural_approaches_clinical";

        try {
            const settingsResponse = await apiFetch("/api/settings");
            if (settingsResponse.ok) {
                const settings = await settingsResponse.json();
                recommendationMode = settings.recommendation_mode_default || recommendationMode;
            }
        } catch (e) {}

        const patientMode = document.getElementById("patient-mode").value;

        let response;
        let data;

        if (patientMode === "existing") {
            const existingPatientId = document.getElementById("existing-patient-select").value;
            if (!existingPatientId) {
                showError("Please select an existing patient.");
                return;
            }

            response = await apiFetch("/api/cases/from-existing-patient-import", {
                method: "POST",
                body: JSON.stringify({
                    temporary_upload_id: temporaryUploadId,
                    patient_id: existingPatientId,
                    scan_metadata: parsedScanMetadata,
                    case: {
                        title: document.getElementById("case_title").value || "QRMA scan case",
                        recommendation_mode: recommendationMode,
                        clinical_context_json: null
                    }
                }),
            });

            data = await response.json();
        } else {
            const payload = {
                temporary_upload_id: temporaryUploadId,
                patient: {
                    first_name: document.getElementById("first_name").value || "",
                    last_name: document.getElementById("last_name").value || "",
                    date_of_birth: document.getElementById("date_of_birth").value || null,
                    age: document.getElementById("age").value ? Number(document.getElementById("age").value) : null,
                    sex: document.getElementById("sex").value || null,
                    height_cm: document.getElementById("height_cm").value ? Number(document.getElementById("height_cm").value) : null,
                    weight_kg: document.getElementById("weight_kg").value ? Number(document.getElementById("weight_kg").value) : null,
                    full_name: [
                        document.getElementById("first_name").value || "",
                        document.getElementById("last_name").value || ""
                    ].join(" ").trim() || null
                },
                scan_metadata: parsedScanMetadata,
                case: {
                    title: document.getElementById("case_title").value || "QRMA scan case",
                    recommendation_mode: recommendationMode,
                    clinical_context_json: null
                }
            };

            response = await apiFetch("/api/cases/create-from-import", {
                method: "POST",
                body: JSON.stringify(payload),
            });

            data = await response.json();
        }

        if (!response.ok) {
            showError(data.detail || data || "Could not create case.");
            return;
        }

        const caseId = data.case_id;

        if (!generateAfter) {
            window.location.href = `/app/cases/${caseId}`;
            return;
        }

        const genResponse = await apiFetch(`/api/cases/${caseId}/generate-report`, {
            method: "POST"
        });

        const genData = await genResponse.json();

        if (!genResponse.ok) {
            showError(genData.detail || "Case created, but report generation failed.");
            window.location.href = `/app/cases/${caseId}`;
            return;
        }

        window.location.href = `/app/cases/${caseId}`;
    }

    document.getElementById("confirm-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        await createCase(false);
    });

    document.getElementById("create-and-generate").addEventListener("click", async () => {
        await createCase(true);
    });
</script>
{% endblock %}
