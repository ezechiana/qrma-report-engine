{% extends "base.html" %}

{% block content %}
<style>
.match-option {
    display: block;
    padding: 10px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    background: white;
}

.match-option:hover {
    background: #f8fafc;
}

.readonly-input {
    background: #f8fafc;
}

.error-action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.error-message-text {
    flex: 1 1 auto;
}

.btn.small {
    padding: 8px 12px;
    font-size: 0.9rem;
}
</style>

<div id="error-box" class="error" style="display:none;"></div>
<div id="success-box" class="success" style="display:none;"></div>

<div class="card">
    <h2>Upload QRMA HTML</h2>
    <p class="muted">Upload the original scan HTML to extract patient details and create a new case.</p>

    <form id="upload-form">
        <div class="field">
            <label>QRMA HTML file</label>
            <input id="scan-file" type="file" accept=".html,.htm" required />
        </div>

        <button type="submit" class="btn">Upload and parse</button>
    </form>
</div>

<div class="card" id="confirm-card" style="display:none;">
    <h2>Confirm patient details</h2>

    <form id="confirm-form">
        <div class="grid-2">
            <div class="field">
                <label>First name</label>
                <input id="first_name" />
            </div>

            <div class="field">
                <label>Last name</label>
                <input id="last_name" />
            </div>

            <div class="field">
                <label>Date of birth</label>
                <input id="date_of_birth" type="date" />
            </div>

            <div class="field">
                <label>Age</label>
                <input id="age" class="readonly-input" readonly />
            </div>

            <div class="field">
                <label>Sex</label>
                <input id="sex" />
            </div>

            <div class="field">
                <label>Height (cm)</label>
                <input id="height_cm" type="number" step="0.1" />
            </div>

            <div class="field">
                <label>Weight (kg)</label>
                <input id="weight_kg" type="number" step="0.1" />
            </div>

            <div class="field">
                <label>Case title</label>
                <input id="case_title" placeholder="QRMA scan case" />
            </div>
        </div>

        <div class="card" id="patient-link-card" style="margin-top:16px;">
            <h3 id="patient-link-title" style="margin-top:0;">Patient matching</h3>
            <p id="patient-link-description" class="muted" style="margin-top:0;">
                Choose whether to create a new patient or link this scan to an existing patient.
            </p>

            <div id="linked-patient-summary" style="display:none; margin-top:10px; font-weight:600;"></div>

            <div class="field">
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="radio" name="patient-link-mode" value="new" checked>
                    Create new patient
                </label>
            </div>

            <div class="field">
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="radio" name="patient-link-mode" value="existing">
                    Link to an existing patient
                </label>
            </div>

            <div id="patient-match-list" style="display:none; margin-top:12px;"></div>

            <div id="patient-mismatch-warning" class="notice" style="display:none; margin-top:12px;"></div>

            <div id="patient-measurement-warning" class="notice" style="display:none; margin-top:12px;"></div>

            <div id="update-measurements-wrap" style="display:none; margin-top:12px;">
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="update-patient-measurements">
                    Update the patient profile with imported height and weight as well
                </label>
            </div>
        </div>

        <div class="btn-row">
            <button type="submit" class="btn">Create case</button>
            <button type="button" class="btn secondary" id="create-and-generate">Create and generate report</button>
        </div>
    </form>
</div>

<script>
    function getQueryParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
    }

    function safeText(value) {
        if (value === null || value === undefined) return "";
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function tryParseJsonString(value) {
        if (typeof value !== "string") return value;
        const trimmed = value.trim();
        if (!trimmed) return value;
        if (!(trimmed.startsWith("{") || trimmed.startsWith("["))) return value;

        try {
            return JSON.parse(trimmed);
        } catch {
            return value;
        }
    }

    function unwrapErrorPayload(msg) {
        // Handles:
        // 1) object with detail
        // 2) raw object
        // 3) JSON string
        // 4) object whose detail is a JSON string
        let out = msg;

        out = tryParseJsonString(out);

        if (out && typeof out === "object" && "detail" in out) {
            out = out.detail;
        }

        out = tryParseJsonString(out);

        return out;
    }

    let preselectedPatientId = getQueryParam("patient_id");
    let temporaryUploadId = null;
    let parsedScanMetadata = null;
    let parsedPatientData = null;
    let allPatients = [];
    let selectedExistingPatientId = null;

    function showError(msg) {
        const box = document.getElementById("error-box");
        const successBox = document.getElementById("success-box");

        successBox.style.display = "none";
        successBox.textContent = "";

        box.style.display = "block";
        box.textContent = "";
        box.innerHTML = "";

        const detail = unwrapErrorPayload(msg);

        if (Array.isArray(detail)) {
            box.innerHTML = detail.map(item => {
                const loc = Array.isArray(item.loc) ? item.loc.join(" → ") : "";
                const text = item.msg || JSON.stringify(item);
                return `<div>${loc ? `<strong>${safeText(loc)}:</strong> ` : ""}${safeText(text)}</div>`;
            }).join("");
            return;
        }

        if (detail && typeof detail === "object") {
            if (detail.code === "duplicate_scan") {
                box.innerHTML = `
                    <div class="error-action-row">
                        <div class="error-message-text">${safeText(detail.message || "This scan has already been imported.")}</div>
                        ${detail.allow_duplicate_supported ? `<button type="button" id="force-import-btn" class="btn small">Import anyway</button>` : ""}
                    </div>
                `;

                const btn = document.getElementById("force-import-btn");
                if (btn) {
                    btn.onclick = async () => {
                        await createCase(false, true);
                    };
                }
                return;
            }

            if (detail.message) {
                box.textContent = detail.message;
                return;
            }

            box.textContent = JSON.stringify(detail);
            return;
        }

        box.textContent = detail || "Something went wrong.";
    }

    function clearError() {
        const box = document.getElementById("error-box");
        box.style.display = "none";
        box.textContent = "";
        box.innerHTML = "";
    }

    function showSuccess(msg) {
        const box = document.getElementById("success-box");
        clearError();
        box.style.display = "block";
        box.textContent = msg;
    }

    function normaliseText(value) {
        return (value || "")
            .toString()
            .trim()
            .toLowerCase()
            .replace(/\s+/g, " ");
    }

    function safeNumber(value) {
        if (value === null || value === undefined || value === "") return null;
        const n = Number(value);
        return Number.isNaN(n) ? null : n;
    }

    function patientName(p) {
        return (
            p.full_name ||
            [p.first_name, p.last_name].filter(Boolean).join(" ").trim() ||
            "Unnamed patient"
        );
    }

    function namesMatch(imported, existing) {
        return (
            normaliseText(imported.first_name) === normaliseText(existing.first_name) &&
            normaliseText(imported.last_name) === normaliseText(existing.last_name)
        );
    }

    function valuesDiffer(a, b) {
        if (a === null || a === undefined || a === "") return false;
        if (b === null || b === undefined || b === "") return false;
        return String(a) !== String(b);
    }

    function scorePatientMatch(imported, existing) {
        let score = 0;

        if (namesMatch(imported, existing)) score += 100;

        if (
            imported.date_of_birth &&
            existing.date_of_birth &&
            imported.date_of_birth === existing.date_of_birth
        ) {
            score += 50;
        }

        if (
            imported.sex &&
            existing.sex &&
            normaliseText(imported.sex) === normaliseText(existing.sex)
        ) {
            score += 10;
        }

        return score;
    }

    async function loadPatientsForMatching() {
        try {
            const response = await apiFetch("/api/patients");
            if (!response.ok) {
                allPatients = [];
                return;
            }
            const data = await response.json().catch(() => ([]));
            allPatients = Array.isArray(data) ? data : (data.items || []);
        } catch (e) {
            console.warn("Could not load patients for matching", e);
            allPatients = [];
        }
    }

    function renderPatientMatches() {
        const list = document.getElementById("patient-match-list");
        const mode = document.querySelector('input[name="patient-link-mode"]:checked')?.value;

        if (mode !== "existing") {
            list.style.display = "none";
            document.getElementById("patient-mismatch-warning").style.display = "none";
            document.getElementById("patient-measurement-warning").style.display = "none";
            document.getElementById("update-measurements-wrap").style.display = "none";
            document.getElementById("update-patient-measurements").checked = false;
            selectedExistingPatientId = null;
            return;
        }

        const imported = {
            first_name: document.getElementById("first_name").value || parsedPatientData?.first_name || "",
            last_name: document.getElementById("last_name").value || parsedPatientData?.last_name || "",
            date_of_birth: document.getElementById("date_of_birth").value || parsedPatientData?.date_of_birth || null,
            sex: document.getElementById("sex").value || parsedPatientData?.sex || null,
            height_cm: safeNumber(document.getElementById("height_cm").value) ?? parsedPatientData?.height_cm ?? null,
            weight_kg: safeNumber(document.getElementById("weight_kg").value) ?? parsedPatientData?.weight_kg ?? null,
        };

        const matches = allPatients
            .map(p => ({ ...p, _score: scorePatientMatch(imported, p) }))
            .sort((a, b) => b._score - a._score);

        list.style.display = "block";

        if (!matches.length) {
            list.innerHTML = `<div class="muted">No existing patients found.</div>`;
            selectedExistingPatientId = null;
            return;
        }

        list.innerHTML = matches.map((p, index) => `
            <label class="match-option">
                <input
                    type="radio"
                    name="existing-patient-choice"
                    value="${p.id}"
                    ${index === 0 ? "checked" : ""}
                    style="margin-right:8px;"
                >
                <strong>${safeText(patientName(p))}</strong>
                <div class="muted" style="margin-top:4px;">
                    DOB: ${safeText(p.date_of_birth)} · Sex: ${safeText(p.sex)} · Cases: ${safeText(p.case_count || 0)}
                </div>
            </label>
        `).join("");

        const first = matches[0];
        selectedExistingPatientId = first ? first.id : null;
        updateLinkWarnings();

        document.querySelectorAll('input[name="existing-patient-choice"]').forEach(radio => {
            radio.addEventListener("change", (e) => {
                selectedExistingPatientId = e.target.value;
                updateLinkWarnings();
            });
        });
    }

    function updateLinkWarnings() {
        const mismatchBox = document.getElementById("patient-mismatch-warning");
        const measurementBox = document.getElementById("patient-measurement-warning");
        const measurementWrap = document.getElementById("update-measurements-wrap");

        mismatchBox.style.display = "none";
        mismatchBox.innerHTML = "";
        measurementBox.style.display = "none";
        measurementBox.innerHTML = "";
        measurementWrap.style.display = "none";
        document.getElementById("update-patient-measurements").checked = false;

        if (!selectedExistingPatientId) return;

        const imported = {
            first_name: document.getElementById("first_name").value || parsedPatientData?.first_name || "",
            last_name: document.getElementById("last_name").value || parsedPatientData?.last_name || "",
            date_of_birth: document.getElementById("date_of_birth").value || parsedPatientData?.date_of_birth || null,
            sex: document.getElementById("sex").value || parsedPatientData?.sex || null,
            height_cm: safeNumber(document.getElementById("height_cm").value) ?? parsedPatientData?.height_cm ?? null,
            weight_kg: safeNumber(document.getElementById("weight_kg").value) ?? parsedPatientData?.weight_kg ?? null,
        };

        const existing = allPatients.find(p => String(p.id) === String(selectedExistingPatientId));
        if (!existing) return;

        const mismatchMessages = [];

        if (!namesMatch(imported, existing)) {
            mismatchMessages.push(
                `Imported name: ${safeText([imported.first_name, imported.last_name].filter(Boolean).join(" "))}; existing patient: ${safeText(patientName(existing))}.`
            );
        }

        if (
            imported.date_of_birth &&
            existing.date_of_birth &&
            imported.date_of_birth !== existing.date_of_birth
        ) {
            mismatchMessages.push(`Date of birth differs (${safeText(imported.date_of_birth)} vs ${safeText(existing.date_of_birth)}).`);
        }

        if (
            imported.sex &&
            existing.sex &&
            normaliseText(imported.sex) !== normaliseText(existing.sex)
        ) {
            mismatchMessages.push(`Sex differs (${safeText(imported.sex)} vs ${safeText(existing.sex)}).`);
        }

        if (mismatchMessages.length) {
            mismatchBox.style.display = "block";
            mismatchBox.innerHTML = `<strong>Warning:</strong> The imported identity details do not fully match this patient.<br>${mismatchMessages.join("<br>")}`;
        }

        const measurementMessages = [];
        if (valuesDiffer(imported.height_cm, existing.height_cm)) {
            measurementMessages.push(`Height differs (${safeText(imported.height_cm)} vs ${safeText(existing.height_cm)} cm).`);
        }
        if (valuesDiffer(imported.weight_kg, existing.weight_kg)) {
            measurementMessages.push(`Weight differs (${safeText(imported.weight_kg)} vs ${safeText(existing.weight_kg)} kg).`);
        }

        if (measurementMessages.length) {
            measurementBox.style.display = "block";
            measurementBox.innerHTML = `<strong>Imported measurements differ from the current patient profile.</strong><br>${measurementMessages.join("<br>")}`;
            measurementWrap.style.display = "block";
        }
    }

    async function handleUploadSubmit(e) {
        e.preventDefault();
        clearError();

        if (!await requireAuthOrRedirect()) return;

        const fileInput = document.getElementById("scan-file");
        if (!fileInput.files.length) {
            showError("Please choose a file.");
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        const response = await apiFetch("/api/cases/import-from-html", {
            method: "POST",
            headers: {},
            body: formData,
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
            showError(data);
            return;
        }

        temporaryUploadId = data.temporary_upload_id;
        parsedScanMetadata = data.scan_metadata || null;

        const p = data.source_patient_data || {};
        parsedPatientData = p;

        document.getElementById("first_name").value = p.first_name || "";
        document.getElementById("last_name").value = p.last_name || "";
        document.getElementById("date_of_birth").value = p.date_of_birth || "";
        document.getElementById("age").value = p.age || "";
        document.getElementById("sex").value = p.sex || "";
        document.getElementById("height_cm").value = p.height_cm || "";
        document.getElementById("weight_kg").value = p.weight_kg || "";
        document.getElementById("case_title").value =
            (p.full_name ? `${p.full_name} QRMA scan` : "QRMA scan case");

        document.getElementById("confirm-card").style.display = "block";

        await loadPatientsForMatching();

        if (preselectedPatientId) {
            document.querySelector('input[value="existing"]').checked = true;
            selectedExistingPatientId = preselectedPatientId;

            document.getElementById("patient-match-list").style.display = "none";

            document.getElementById("patient-link-title").textContent = "Linked patient";
            document.getElementById("patient-link-description").textContent =
                "This case will be linked to the patient record you started from.";

            const existing = allPatients.find(p => String(p.id) === String(preselectedPatientId));
            if (existing) {
                const summary = document.getElementById("linked-patient-summary");
                summary.style.display = "block";
                summary.textContent = patientName(existing);
            }

            document.querySelectorAll('input[name="patient-link-mode"]').forEach(el => {
                el.closest("label").style.display = "none";
            });

            updateLinkWarnings();
        } else {
            renderPatientMatches();
        }

        showSuccess("Scan parsed successfully. Please confirm the patient details.");
    }

    async function createCase(generateAfter = false, forceDuplicate = false) {
        clearError();

        if (!temporaryUploadId) {
            showError("Please upload and parse a scan first.");
            return;
        }

        let recommendationMode = "natural_approaches_clinical";

        try {
            const settingsResponse = await apiFetch("/api/settings");
            if (settingsResponse.ok) {
                const settings = await settingsResponse.json();
                recommendationMode = settings.recommendation_mode_default || recommendationMode;
            }
        } catch (e) {
            console.warn("Could not load recommendation mode from settings", e);
        }

        const linkMode = document.querySelector('input[name="patient-link-mode"]:checked')?.value || "new";

        if (linkMode === "existing" && !selectedExistingPatientId) {
            showError("Please select an existing patient to link this scan to.");
            return;
        }

        const mismatchVisible = document.getElementById("patient-mismatch-warning").style.display !== "none";
        if (linkMode === "existing" && mismatchVisible) {
            const confirmed = window.confirm(
                "The imported name or identity details do not fully match the selected patient record. Do you want to continue linking this scan?"
            );
            if (!confirmed) return;
        }

        const payload = {
            temporary_upload_id: temporaryUploadId,
            patient: {
                first_name: document.getElementById("first_name").value || "",
                last_name: document.getElementById("last_name").value || "",
                date_of_birth: document.getElementById("date_of_birth").value || null,
                age: document.getElementById("age").value ? Number(document.getElementById("age").value) : null,
                sex: document.getElementById("sex").value || null,
                height_cm: safeNumber(document.getElementById("height_cm").value),
                weight_kg: safeNumber(document.getElementById("weight_kg").value),
                full_name: [
                    document.getElementById("first_name").value || "",
                    document.getElementById("last_name").value || ""
                ].join(" ").trim() || null
            },
            scan_metadata: parsedScanMetadata,
            case: {
                title: document.getElementById("case_title").value || "QRMA scan case",
                recommendation_mode: recommendationMode,
                clinical_context_json: null
            },
            existing_patient_id: linkMode === "existing" ? selectedExistingPatientId : null,
            update_patient_measurements: (
                linkMode === "existing" &&
                document.getElementById("update-patient-measurements").checked
            ),
            allow_duplicate: forceDuplicate
        };

        const response = await apiFetch("/api/cases/create-from-import", {
            method: "POST",
            body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
            showError(data);
            return;
        }

        const caseId = data.case_id;

        if (!generateAfter) {
            window.location.href = `/app/cases/${caseId}`;
            return;
        }

        const genResponse = await apiFetch(`/api/cases/${caseId}/generate-report`, {
            method: "POST"
        });

        const genData = await genResponse.json().catch(() => ({}));

        if (!genResponse.ok) {
            showError(genData);
            window.location.href = `/app/cases/${caseId}`;
            return;
        }

        window.location.href = `/app/cases/${caseId}`;
    }

    document.getElementById("upload-form").addEventListener("submit", handleUploadSubmit);

    document.getElementById("confirm-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        await createCase(false);
    });

    document.getElementById("create-and-generate").addEventListener("click", async () => {
        await createCase(true);
    });

    document.querySelectorAll('input[name="patient-link-mode"]').forEach(radio => {
        radio.addEventListener("change", renderPatientMatches);
    });

    ["first_name", "last_name", "date_of_birth", "sex", "height_cm", "weight_kg"].forEach(id => {
        document.getElementById(id).addEventListener("input", () => {
            if (document.querySelector('input[name="patient-link-mode"]:checked')?.value === "existing") {
                renderPatientMatches();
            }
        });
    });
</script>
{% endblock %}
