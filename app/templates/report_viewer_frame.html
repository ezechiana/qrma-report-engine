{% extends "base.html" %}

{% block content %}
<div class="page-header" style="margin-bottom:16px;">
    <h1 style="margin:0;">Report viewer</h1>
    <p class="muted" style="margin-top:4px;">
        Use the workspace navigation on the left while reviewing the full assessment report.
    </p>

    <div class="btn-row" style="margin-top:12px;">
        <a class="btn secondary" href="/app/reports/{{ report.id }}">Report detail</a>
        <a class="btn secondary" href="/app/reports">All reports</a>
    </div>
</div>

<div class="card" style="padding:0; overflow:hidden;">
    {% set viewer_mode = "patient" %}
    {% include "report_viewer.html" %}
</div>
{% endblock %}
