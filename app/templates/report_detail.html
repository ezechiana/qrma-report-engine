
{% extends "base.html" %}

{% block content %}
<div id="error-box" class="error" style="display:none;"></div>
<div id="success-box" class="success" style="display:none;"></div>

<div class="card">
    <div style="margin-bottom:10px;">
        <div style="font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:700; margin-bottom:8px;">
            Generated report
        </div>
        <h2 id="report-page-title" style="margin:0 0 8px; font-size:28px; line-height:1.15;">Loading report…</h2>
        <div class="muted" style="font-size:15px; line-height:1.6;">
            Open the full report, download the PDF, or create a secure share link for the client.
        </div>
    </div>

    <details style="border-top:1px solid var(--line); padding-top:12px;">
        <summary style="cursor:pointer; font-weight:700;">Report metadata</summary>
        <div id="report-summary" class="muted" style="margin-top:12px;">Loading report…</div>
    </details>
</div>

<div class="card">
    <h3>Actions</h3>
    <div class="btn-row">
        <a class="btn" id="open-full-report-btn" href="#">Open full report</a>
        <a class="btn secondary" id="download-pdf-btn" href="#" target="_blank">Download PDF</a>
        <button class="btn secondary" id="generate-new-version-btn" type="button">Generate new version</button>
    </div>
</div>

<div class="card">
    <h3>Share report</h3>
    <div class="field">
        <label>Optional password</label>
        <input id="share-password" placeholder="Leave blank for no password" />
    </div>
    <div class="btn-row">
        <button class="btn" id="create-share-link-btn" type="button">Create share link</button>
    </div>
    <div id="share-result" class="muted" style="margin-top:12px;"></div>
</div>

<script>
    const reportId = "{{ report_id }}";

    function setError(msg) {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearError() {
        const box = document.getElementById("error-box");
        box.style.display = "none";
        box.textContent = "";
    }

    function setSuccess(msg) {
        const box = document.getElementById("success-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearSuccess() {
        const box = document.getElementById("success-box");
        box.style.display = "none";
        box.textContent = "";
    }

    async function loadReport() {
        clearError();

        const authed = await requireAuthOrRedirect();
        if (!authed) return;

        try {
            const response = await apiFetch(`/api/reports/${reportId}`);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                setError(data.detail || "Could not load report.");
                return;
            }

            document.getElementById("report-page-title").textContent =
                data.display_name || "Personalised Wellness Scan Report";

            document.getElementById("report-summary").innerHTML = `
                <strong>${safeText(data.display_name)}</strong><br>
                Patient: ${safeText(data.patient_display_name)}<br>
                Version: v${safeText(data.version_number)}<br>
                Scan date: ${formatDate(data.scan_datetime)}<br>
                Generated: ${formatDate(data.generated_at)}
            `;

            document.getElementById("open-full-report-btn").href = `/app/reports/${reportId}/view`;
            document.getElementById("download-pdf-btn").href = `/api/reports/${reportId}/pdf`;
        } catch (err) {
            console.error(err);
            setError("Unexpected error while loading report.");
        }
    }

    async function createShareLink() {
        clearError();
        clearSuccess();

        try {
            const payload = {
                password: document.getElementById("share-password").value || null,
                expires_at: null
            };

            const response = await apiFetch(`/api/reports/${reportId}/share-links`, {
                method: "POST",
                body: JSON.stringify(payload),
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                setError(data.detail || "Could not create share link.");
                return;
            }

            document.getElementById("share-result").innerHTML = `
                <strong>Share link:</strong><br>
                <a class="link" href="${data.share_url}" target="_blank">${data.share_url}</a>
            `;

            setSuccess("Share link created.");
        } catch (err) {
            console.error(err);
            setError("Unexpected error while creating share link.");
        }
    }


    const shareBtn = document.getElementById("create-share-link-btn");
    if (shareBtn) {
        shareBtn.addEventListener("click", createShareLink);
    }

    const generateBtn = document.getElementById("generate-new-version-btn");

    if (generateBtn) {
        generateBtn.addEventListener("click", async () => {
            clearError();
            clearSuccess();

            try {
                generateBtn.disabled = true;
                generateBtn.textContent = "Generating...";

                const res = await apiFetch(`/api/reports/${reportId}/generate-new-version`, {
                    method: "POST"
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    setError(data.detail || "Failed to generate new version.");
                    return;
                }

                setSuccess("New report version generated.");
                await loadReport();

            } catch (err) {
                console.error(err);
                setError("Unexpected error while generating report.");
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = "Generate new version";
            }
        });
    }
    loadReport();
</script>
{% endblock %}
