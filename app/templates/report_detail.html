{% extends "base.html" %}

{% block content %}
<div id="error-box" class="error" style="display:none;"></div>
<div id="success-box" class="success" style="display:none;"></div>

<div class="card">
    <h2>Report detail</h2>
    <div id="report-summary" class="muted">Loading report…</div>
</div>

<div class="card">
    <h3>Actions</h3>
    <div class="btn-row">
        <button id="open-inline-btn" type="button">Load report viewer</button>
        <a class="btn secondary" id="download-pdf-btn" href="#" target="_blank">Download PDF</a>
        <a class="btn secondary" id="open-html-btn" href="#" target="_blank">Open HTML</a>
        <a class="btn secondary" id="open-json-btn" href="#" target="_blank">View JSON</a>
        <button id="refresh-report-btn" type="button">Refresh report</button>
    </div>
</div>

<div class="card">
    <h3>Full report viewer</h3>
    <iframe id="report-frame" class="report-frame"></iframe>
</div>

<div class="card">
    <h3>Share report</h3>
    <div class="field">
        <label>Optional password</label>
        <input id="share-password" placeholder="Leave blank for no password" />
    </div>
    <div class="btn-row">
        <button id="create-share-link-btn" type="button">Create share link</button>
    </div>
    <div id="share-result" class="muted" style="margin-top:12px;"></div>
</div>

<script>
    const reportId = "{{ report_id }}";
    let latestShareUrl = null;

    function setError(msg) {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearError() {
        const box = document.getElementById("error-box");
        box.style.display = "none";
        box.textContent = "";
    }

    function setSuccess(msg) {
        const box = document.getElementById("success-box");
        box.style.display = "block";
        box.textContent = msg;
    }

    function clearSuccess() {
        const box = document.getElementById("success-box");
        box.style.display = "none";
        box.textContent = "";
    }

    async function loadReport() {
        clearError();

        const response = await apiFetch(`/api/reports/${reportId}`);
        const data = await response.json();

        if (!response.ok) {
            setError(data.detail || "Could not load report.");
            return;
        }

        document.getElementById("report-summary").innerHTML = `
            <strong>Version ${safeText(data.version_number)}</strong><br>
            Status: ${safeText(data.status)}<br>
            Generated: ${formatDate(data.generated_at)}<br>
            Case ID: ${safeText(data.case_id)}
        `;

        document.getElementById("download-pdf-btn").href = `/api/reports/${reportId}/pdf`;
        document.getElementById("open-html-btn").href = `/api/reports/${reportId}/html`;
        document.getElementById("open-json-btn").href = `/api/reports/${reportId}/json`;
    }

    async function createShareLink(openInline = false) {
        clearError();
        clearSuccess();

        const payload = {
            password: document.getElementById("share-password").value || null,
            expires_at: null
        };

        const response = await apiFetch(`/api/reports/${reportId}/share-links`, {
            method: "POST",
            body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
            setError(data.detail || "Could not create share link.");
            return null;
        }

        latestShareUrl = data.share_url;
        document.getElementById("share-result").innerHTML = `
            <strong>Share link:</strong><br>
            <a class="link" href="${data.share_url}" target="_blank">${data.share_url}</a>
        `;
        setSuccess("Share link created.");

        if (openInline) {
            document.getElementById("report-frame").src = data.share_url;
        }

        return data.share_url;
    }

    async function loadInlineViewer() {
        if (latestShareUrl) {
            document.getElementById("report-frame").src = latestShareUrl;
            return;
        }
        await createShareLink(true);
    }

    document.getElementById("refresh-report-btn").addEventListener("click", loadReport);
    document.getElementById("create-share-link-btn").addEventListener("click", () => createShareLink(false));
    document.getElementById("open-inline-btn").addEventListener("click", loadInlineViewer);

    loadReport();
</script>
{% endblock %}
