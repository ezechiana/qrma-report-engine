<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unlock Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f9f6;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }
        .wrap {
            max-width: 420px;
            margin: 80px auto;
            padding: 24px;
        }
        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }
        p {
            margin: 0 0 20px;
            line-height: 1.5;
            color: #4b5563;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: 0;
            border-radius: 10px;
            background: #2f4f2f;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.95;
        }
        .meta {
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Protected report</h1>
            <p>Please enter the password provided to unlock this shared report.</p>

            <form method="post" action="/share/{{ token }}/verify-password">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required />
                <button type="submit">Unlock report</button>
            </form>

            <div class="meta">
                NaturalApproaches.com
            </div>
        </div>
    </div>
</body>
</html>
