<script>
(function () {
    const navLinks = document.querySelectorAll('.nav-list a');
    navLinks.forEach((link) => {
        link.addEventListener('click', () => {
            navLinks.forEach((l) => l.classList.remove('active'));
            link.classList.add('active');
        });
    });

    const tabButtons = document.querySelectorAll('.tab-btn');
    tabButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
            const panelId = btn.dataset.tab;
            const relatedGroup = btn.closest('section, .card, .marker-group-body') || document;
            const localButtons = relatedGroup.querySelectorAll('.tab-btn');
            const localPanels = relatedGroup.querySelectorAll('.tab-panel');
            localButtons.forEach((b) => b.classList.remove('active'));
            localPanels.forEach((p) => p.classList.remove('active'));
            btn.classList.add('active');
            const panel = document.getElementById(panelId);
            if (panel) panel.classList.add('active');
        });
    });

    const jumpCards = document.querySelectorAll('[data-marker-target]');
    jumpCards.forEach((card) => {
        card.addEventListener('click', () => {
            const targetId = card.getAttribute('data-marker-target');
            if (!targetId) return;
            const target = document.getElementById(targetId);
            if (!target) return;

            const body = target.querySelector('.marker-group-body');
            if (body && !body.classList.contains('open')) {
                body.classList.add('open');
            }

            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
})();

function toggleMarkerGroup(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
}

function toggleMarkerDetail(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
}
</script>

<script>
(function () {
  function openMarkerCategoryFromHash() {
    const hash = window.location.hash || "";
    if (!hash.startsWith("#marker-category-")) return;

    const target = document.querySelector(hash);
    if (!target) return;

    const group = target.closest(".marker-group");
    if (group) {
      const body = group.querySelector(".marker-group-body");
      if (body) body.classList.add("open");
      const toggle = group.querySelector("[aria-expanded]");
      if (toggle) toggle.setAttribute("aria-expanded", "true");
    }

    setTimeout(function () {
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  }

  window.addEventListener("hashchange", openMarkerCategoryFromHash);
  document.addEventListener("DOMContentLoaded", openMarkerCategoryFromHash);
})();
</script>


<script>
(function () {
    if (window.__go360MarkerFilterBound) return;
    window.__go360MarkerFilterBound = true;
    function toInt(value) {
        const parsed = parseInt(value || "0", 10);
        return Number.isFinite(parsed) ? parsed : 0;
    }
    function applyMarkerCategoryFilter(filter) {
        const safeFilter = ["all", "flagged", "watchlist", "no-flagged"].includes(filter) ? filter : "all";
        const groups = document.querySelectorAll("#markers .marker-group[data-flagged-count]");
        groups.forEach(function (group) {
            const flagged = toInt(group.getAttribute("data-flagged-count"));
            const watchlist = toInt(group.getAttribute("data-watchlist-count"));
            let show = true;
            if (safeFilter === "flagged") show = flagged > 0;
            if (safeFilter === "watchlist") show = watchlist > 0;
            if (safeFilter === "no-flagged") show = flagged === 0;
            group.classList.toggle("marker-filter-hidden", !show);
        });
    }
    document.addEventListener("click", function (event) {
        const btn = event.target.closest(".marker-filter-btn");
        if (!btn) return;
        event.preventDefault();
        const bar = btn.closest(".marker-filter-bar");
        if (bar) {
            bar.querySelectorAll(".marker-filter-btn").forEach(function (item) {
                item.classList.remove("active");
                item.setAttribute("aria-pressed", "false");
            });
        }
        btn.classList.add("active");
        btn.setAttribute("aria-pressed", "true");
        applyMarkerCategoryFilter(btn.getAttribute("data-marker-filter") || "all");
    }, { passive: false });
    document.addEventListener("DOMContentLoaded", function () {
        const active = document.querySelector(".marker-filter-btn.active");
        if (active) {
            active.setAttribute("aria-pressed", "true");
            applyMarkerCategoryFilter(active.getAttribute("data-marker-filter") || "all");
        }
    });
})();
</script>
