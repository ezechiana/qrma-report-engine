<!DOCTYPE html>
<html lang="en"><head><title>Forgot password · go360</title><meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{--bg:#eef3ef;--panel:#ffffff;--text:#10201b;--muted:#5f6f68;--line:#d9e4dd;--blue:#1d4ed8;--blue-dark:#1e40af;--danger:#b42318;--danger-bg:#fef3f2;--success:#065f46;--success-bg:#ecfdf5;--shadow:0 20px 50px rgba(16,32,27,.10)}
*{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#f7faf8 0%,#eef3ef 100%)}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.auth-card{width:100%;max-width:560px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:34px}.logo{font-size:42px;font-weight:900;letter-spacing:-.05em;margin-bottom:18px}.logo span{color:var(--blue)}h1{margin:0 0 10px;font-size:38px;letter-spacing:-.04em}.muted{color:var(--muted);line-height:1.55;margin:0 0 18px}.field{margin-bottom:16px}.field label{display:block;margin-bottom:8px;font-weight:800;font-size:14px}.field input{width:100%;height:56px;padding:0 16px;border:1px solid #cfe0d6;border-radius:16px;font-size:16px;background:#fff}.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(29,78,216,.10)}.btn{width:100%;height:58px;border:none;border-radius:16px;background:var(--blue);color:white;font-size:18px;font-weight:900;cursor:pointer}.btn:hover{background:var(--blue-dark)}.message{display:none;margin-bottom:16px;padding:13px 15px;border-radius:14px;line-height:1.45}.message.error{background:var(--danger-bg);border:1px solid #fecdca;color:var(--danger)}.message.success{background:var(--success-bg);border:1px solid #bbf7d0;color:var(--success)}.links{margin-top:18px;color:var(--muted);font-size:14px}.links a{color:var(--blue);font-weight:800;text-decoration:none}.hint{font-size:13px;color:var(--muted);line-height:1.45;margin:12px 0 22px}.hint strong{color:var(--text)}
</style>
</head>
<body><main class="auth-page"><div class="auth-card"><div class="logo"><span>go</span>360</div><h1>Reset your password</h1><p class="muted">Enter your email address. If an account exists, we’ll send a secure reset link.</p><p class="hint"><strong>Can’t see the email?</strong> Please check your junk, spam, promotions, or quarantine folder. The email will come from <strong>go360</strong> at <strong>no-reply@mail.go360.io</strong>.</p><div id="message" class="message"></div><form id="forgot-form"><div class="field"><label>Email address</label><input id="email" type="email" autocomplete="email" required /></div><button class="btn" type="submit">Send reset link →</button></form><div class="links"><a href="/login">← Back to sign in</a></div></div></main><script>
function show(type,msg){const el=document.getElementById('message');el.className='message '+type;el.textContent=msg;el.style.display='block';}
document.getElementById('forgot-form').addEventListener('submit',async(e)=>{e.preventDefault();const email=document.getElementById('email').value.trim();const res=await fetch('/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const data=await res.json().catch(()=>({}));show(res.ok?'success':'error',data.message||data.detail||'If an account exists, a reset link has been sent. Please check your inbox, junk, spam, promotions, or quarantine folder.');if(data.dev_reset_url){console.log('Development reset link:',data.dev_reset_url);}});
</script></body></html>
