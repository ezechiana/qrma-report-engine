{% extends "base.html" %}

{% block content %}
<style>
    .report-viewer-frame-shell {
        width: 100%;
        min-width: 0;
    }

    .report-viewer-frame-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
    }

    .report-viewer-frame-title {
        min-width: 0;
    }

    .report-viewer-frame-title h2 {
        margin: 0 0 4px;
        font-size: 22px;
        line-height: 1.2;
    }

    .report-viewer-frame-title p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
    }

    .report-viewer-frame {
        width: 100%;
        min-height: calc(100vh - 170px);
        border: 1px solid var(--line);
        border-radius: 18px;
        background: white;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    @media (max-width: 760px) {
        .report-viewer-frame {
            min-height: calc(100vh - 130px);
            border-radius: 14px;
        }
    }
</style>

<div class="report-viewer-frame-shell">
    <div class="report-viewer-frame-toolbar">
        <div class="report-viewer-frame-title">
            <h2>Report viewer</h2>
            <p>Use the workspace navigation on the left while reviewing the full assessment report.</p>
        </div>
        <div class="btn-row">
            <a class="btn secondary" href="/app/reports/{{ report_id }}">Report detail</a>
            <a class="btn secondary" href="/app/reports">All reports</a>
        </div>
    </div>

    <iframe
        class="report-viewer-frame"
        src="/api/reports/{{ report_id }}/view"
        title="Assessment report viewer"
        loading="eager"
    ></iframe>
</div>
{% endblock %}
