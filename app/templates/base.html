<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ title or "Health Portal" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --brand: #1d4ed8;
            --brand-dark: #1e40af;
            --sidebar: #111827;
            --sidebar-muted: #9ca3af;
            --radius: 12px;
            --success-bg: #ecfdf5;
            --success-line: #a7f3d0;
            --success-text: #065f46;
            --error-bg: #fef2f2;
            --error-line: #fecaca;
            --error-text: #991b1b;
            --warn-bg: #fff7ed;
            --warn-line: #fdba74;
            --warn-text: #9a3412;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        a { color: inherit; text-decoration: none; }

        .app {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--sidebar);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            margin: 0 0 6px;
            font-size: 20px;
        }

        .sidebar .subtle {
            color: var(--sidebar-muted);
            font-size: 13px;
            margin-bottom: 18px;
            line-height: 1.45;
        }

        .sidebar nav a {
            display: block;
            color: var(--sidebar-muted);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .sidebar-footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.12);
            color: var(--sidebar-muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .sidebar-footer a {
            color: white;
            display: inline-block;
            margin-top: 10px;
        }

        .main {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .topbar-title {
            font-size: 22px;
            font-weight: 700;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .account-trigger {
            border: 1px solid var(--line);
            background: white;
            border-radius: 999px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .account-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 220px;
            background: white;
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.10);
            padding: 8px;
            display: none;
            z-index: 100;
        }

        .account-menu.open {
            display: block;
        }

        .account-menu-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 6px;
        }

        .account-menu-name {
            font-weight: 700;
            font-size: 14px;
        }

        .account-menu-email {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
            word-break: break-word;
        }

        .account-menu a,
        .account-menu button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            border: none;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font: inherit;
            color: var(--text);
        }

        .account-menu a:hover,
        .account-menu button:hover {
            background: #f8fafc;
        }

        .content {
            padding: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: var(--brand);
            color: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
        }

        .btn:hover { background: var(--brand-dark); }

        .btn.secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .field { margin-bottom: 12px; }

        .field label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }

        .table th {
            font-size: 13px;
            color: var(--muted);
            font-weight: 700;
        }

        .muted { color: var(--muted); }

        .notice, .success, .error {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .notice {
            background: var(--warn-bg);
            border: 1px solid var(--warn-line);
            color: var(--warn-text);
        }

        .success {
            background: var(--success-bg);
            border: 1px solid var(--success-line);
            color: var(--success-text);
        }

        .error {
            background: var(--error-bg);
            border: 1px solid var(--error-line);
            color: var(--error-text);
        }

        .link {
            color: var(--brand);
            text-decoration: none;
        }

        .link:hover { text-decoration: underline; }

        iframe.report-frame {
            width: 100%;
            min-height: 82vh;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: white;
        }

        .mobile-topbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 45;
        }

        .mobile-topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .mobile-menu-btn,
        .mobile-close-btn {
            border: 1px solid var(--line);
            background: white;
            border-radius: 10px;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            color: var(--text);
        }

        .mobile-topbar-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }

        .sidebar-backdrop {
            display: none;
        }


        
        @media (max-width: 960px) {
            .app { grid-template-columns: 1fr; }

            .sidebar {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                max-width: 86vw;
                height: 100vh;
                transform: translateX(-100%);
                transition: transform .22s ease;
                z-index: 50;
                box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(17, 24, 39, 0.45);
                z-index: 49;
            }

            .sidebar-backdrop.open {
                display: block;
            }

            .mobile-topbar {
                display: flex;
            }

            .topbar {
                padding: 14px 16px;
            }

            .content {
                padding: 14px 12px 20px;
            }

            .grid-3, .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .topbar {
                display: none;
            }

            .content {
                padding: 12px 10px 18px;
            }
        }
    </style>

    <script>
        function getAccessToken() { return localStorage.getItem("access_token"); }
        function getRefreshToken() { return localStorage.getItem("refresh_token"); }

        function getCurrentUser() {
            const raw = localStorage.getItem("current_user");
            if (!raw) return null;
            try { return JSON.parse(raw); } catch { return null; }
        }

        function setAuthSession(payload) {
            localStorage.setItem("access_token", payload.access_token || "");
            localStorage.setItem("refresh_token", payload.refresh_token || "");
            localStorage.setItem("current_user", JSON.stringify(payload.user || null));
        }

        function clearAuthSession() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("refresh_token");
            localStorage.removeItem("current_user");
        }

        function getRedirectTarget() {
            const path = window.location.pathname || "/app";
            const search = window.location.search || "";
            const hash = window.location.hash || "";
            return `${path}${search}${hash}`;
        }

        function rememberRedirectTarget() {
            const currentPath = window.location.pathname || "";
            if (currentPath.startsWith("/login") || currentPath.startsWith("/register")) return;
            localStorage.setItem("redirect_after_login", getRedirectTarget());
        }

        function redirectToLogin() {
            rememberRedirectTarget();
            window.location.href = "/login";
        }

        async function apiFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            if (!headers.has("Content-Type") && !(options.body instanceof FormData)) {
                headers.set("Content-Type", "application/json");
            }

            const response = await fetch(url, {
                ...options,
                headers,
                credentials: "same-origin",
            });

            if (response.status === 401) {
                clearAuthSession();
                redirectToLogin();
            }

            return response;
        }

        async function requireAuthOrRedirect() {
            try {
                const response = await fetch("/auth/me", {
                    method: "GET",
                    credentials: "same-origin",
                });

                if (response.status === 401 || !response.ok) {
                    clearAuthSession();
                    redirectToLogin();
                    return false;
                }

                const data = await response.json();
                if (data && data.user) {
                    localStorage.setItem("current_user", JSON.stringify(data.user));
                }
                return true;
            } catch (e) {
                clearAuthSession();
                redirectToLogin();
                return false;
            }
        }

        async function logoutNow() {
            try {
                await fetch("/auth/logout", {
                    method: "POST",
                    credentials: "same-origin",
                });
            } catch (e) {}
            clearAuthSession();
            window.location.href = "/login";
        }

        function formatDate(value) {
            if (!value) return "—";
            try { return new Date(value).toLocaleString(); } catch { return value; }
        }

        function safeText(value, fallback = "—") {
            if (value === null || value === undefined || value === "") return fallback;
            return String(value);
        }
    </script>
</head>
<body>
<div class="app">
    <aside class="sidebar" id="app-sidebar">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <div>
                <h2>Health Portal</h2>
                <div class="subtle">Practitioner workspace</div>
            </div>
            <button class="mobile-close-btn" id="mobile-close-btn" aria-label="Close menu" style="display:none;">×</button>
        </div>

        <nav>
            <a href="/app" id="nav-dashboard">Dashboard</a>
            <a href="/app/patients" id="nav-patients">Patients</a>
            <a href="/app/cases" id="nav-cases">Cases</a>
            <a href="/app/reports" id="nav-reports">Reports</a>
        </nav>

        <div class="sidebar-footer">
            <div id="sidebar-user-email">Signed in</div>
        </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <main class="main">
        <div class="mobile-topbar">
            <div class="mobile-topbar-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">☰</button>
                <div class="mobile-topbar-title">{{ title if title else "Health Portal" }}</div>
            </div>
            <button class="account-trigger" id="mobile-account-trigger" type="button">⋯</button>
        </div>

        {% if title is not none and title != "" %}
        <div class="topbar">
            <div class="topbar-title">{{ title }}</div>
            <div class="topbar-actions">
                <button class="account-trigger" id="account-trigger" type="button">Account</button>
                <div class="account-menu" id="account-menu">
                    <div class="account-menu-header">
                        <div class="account-menu-name" id="account-menu-name">Practitioner</div>
                        <div class="account-menu-email" id="account-menu-email">Signed in</div>
                    </div>
                    <a href="/app/settings">Settings</a>
                    <a href="/app/billing">Billing</a>
                    <button type="button" onclick="logoutNow()">Logout</button>
                </div>
            </div>
        </div>
        {% endif %}

        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<script>
    (async function hydrateShell() {
        const path = window.location.pathname;

        if (!path.startsWith("/login") && !path.startsWith("/register")) {
            const isAuthenticated = await requireAuthOrRedirect();
            if (!isAuthenticated) return;
        }

        const user = getCurrentUser();
        if (user) {
            const emailEl = document.getElementById("sidebar-user-email");
            const menuNameEl = document.getElementById("account-menu-name");
            const menuEmailEl = document.getElementById("account-menu-email");

            const displayName = user.full_name || "Practitioner";
            const email = user.email || "Signed in";

            if (emailEl) emailEl.textContent = email;
            if (menuNameEl) menuNameEl.textContent = displayName;
            if (menuEmailEl) menuEmailEl.textContent = email;
        }

        if (path === "/app") {
            document.getElementById("nav-dashboard")?.classList.add("active");
        } else if (path.startsWith("/app/patients")) {
            document.getElementById("nav-patients")?.classList.add("active");
        } else if (path.startsWith("/app/cases")) {
            document.getElementById("nav-cases")?.classList.add("active");
        } else if (path.startsWith("/app/reports")) {
            document.getElementById("nav-reports")?.classList.add("active");
        }

        const sidebar = document.getElementById("app-sidebar");
        const backdrop = document.getElementById("sidebar-backdrop");
        const openBtn = document.getElementById("mobile-menu-btn");
        const closeBtn = document.getElementById("mobile-close-btn");
        const accountTrigger = document.getElementById("account-trigger");
        const mobileAccountTrigger = document.getElementById("mobile-account-trigger");
        const accountMenu = document.getElementById("account-menu");

        function isMobile() {
            return window.innerWidth <= 960;
        }

        function openSidebar() {
            if (!isMobile() || !sidebar || !backdrop) return;
            sidebar.classList.add("open");
            backdrop.classList.add("open");
            document.body.style.overflow = "hidden";
        }

        function closeSidebar() {
            if (sidebar) sidebar.classList.remove("open");
            if (backdrop) backdrop.classList.remove("open");
            document.body.style.overflow = "";
        }

        function syncMobileShell() {
            if (closeBtn) closeBtn.style.display = isMobile() ? "inline-flex" : "none";
            if (!isMobile()) closeSidebar();
        }

        function toggleAccountMenu() {
            if (!accountMenu) return;
            accountMenu.classList.toggle("open");
        }

        function closeAccountMenu() {
            if (accountMenu) accountMenu.classList.remove("open");
        }

        if (openBtn) openBtn.addEventListener("click", openSidebar);
        if (closeBtn) closeBtn.addEventListener("click", closeSidebar);
        if (backdrop) backdrop.addEventListener("click", closeSidebar);

        if (accountTrigger) {
            accountTrigger.addEventListener("click", function (e) {
                e.stopPropagation();
                toggleAccountMenu();
            });
        }

        if (mobileAccountTrigger) {
            mobileAccountTrigger.addEventListener("click", function (e) {
                e.stopPropagation();
                toggleAccountMenu();
            });
        }

        document.addEventListener("click", function (e) {
            if (!accountMenu) return;
            if (!accountMenu.contains(e.target) &&
                e.target !== accountTrigger &&
                e.target !== mobileAccountTrigger) {
                closeAccountMenu();
            }
        });

        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                closeSidebar();
                closeAccountMenu();
            }
        });

        window.addEventListener("resize", syncMobileShell);
        syncMobileShell();
    })();
</script>
</body>
</html>
