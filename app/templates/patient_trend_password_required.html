<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password required</title>
  <style>
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f6f8f5; color:#183028; display:grid; min-height:100vh; place-items:center; padding:20px; }
    .card { width:100%; max-width:420px; background:#fff; border:1px solid #dfe7e1; border-radius:20px; padding:24px; box-shadow:0 16px 34px rgba(15,23,42,.08); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { color:#5f7269; line-height:1.5; }
    label { display:block; font-weight:700; margin:16px 0 6px; }
    input { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:12px; font-size:16px; }
    button { margin-top:14px; width:100%; padding:12px 14px; border:0; border-radius:999px; background:#2f4f2f; color:#fff; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/share/{{ token }}/trend/verify-password">
    <h1>Password required</h1>
    <p>This progress dashboard is protected. Enter the password provided by your practitioner.</p>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
    <button type="submit">View progress dashboard</button>
  </form>
</body>
</html>
