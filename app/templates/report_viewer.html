<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ tenant.tenant_name or report.viewer.tenant.brand_name or "Report Viewer" }}</title>
    {% include "report_viewer_styles.html" %}
</head>
<body>
    {% include "report_viewer_partial.html" %}
    {% include "report_viewer_scripts.html" %}

<script>
(function(){
  const viewerMode = "{{ viewer_mode|default('patient') }}";
  if (viewerMode === "patient") {
    document.querySelectorAll('a').forEach(function(a){
      const text = (a.textContent || '').toLowerCase();
      const href = (a.getAttribute('href') || '').toLowerCase();
      if (text.includes('back to report workspace') || (text.includes('workspace') && href.startsWith('/app'))) {
        a.remove();
      }
    });
  }
})();
</script>
</body>
</html>
